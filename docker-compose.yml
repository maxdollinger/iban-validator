services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8080:8080"
    environment:
      SQLITE_DB_PATH: /data/iban.db
    volumes:
      - dbdata:/data
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 8g

volumes:
  dbdata:

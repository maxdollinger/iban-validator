services:
  postgres:
    image: postgres:18
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 12g
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_iban_dev
      POSTGRES_DB: iban
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/iban
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 4g
    depends_on:
      postgres:
        condition: service_healthy
  frontend:
    build: ./frontend
    ports:
      - "3000:80"

volumes:
  pgdata:

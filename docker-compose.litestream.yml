services:
  litestream-restore:
    image: litestream/litestream:latest
    volumes:
      - dbdata:/data
      - ./litestream.yml:/etc/litestream.yml:ro
    environment:
      - AWS_ACCESS_KEY_ID
      - AWS_SECRET_ACCESS_KEY
      - AWS_REGION
      - LITESTREAM_S3_BUCKET
      - LITESTREAM_S3_PATH
    entrypoint: ["litestream", "restore", "-if-replica-exists", "/data/iban.db"]

  backend:
    depends_on:
      litestream-restore:
        condition: service_completed_successfully

  litestream-replicate:
    image: litestream/litestream:latest
    volumes:
      - dbdata:/data
      - ./litestream.yml:/etc/litestream.yml:ro
    environment:
      - AWS_ACCESS_KEY_ID
      - AWS_SECRET_ACCESS_KEY
      - AWS_REGION
      - LITESTREAM_S3_BUCKET
      - LITESTREAM_S3_PATH
    command: replicate
    depends_on:
      backend:
        condition: service_started
